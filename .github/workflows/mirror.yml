on: push

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: yesolutions/mirror-action@master
        with:
          REMOTE: 'https://codeberg.org/LegitiDevs/bot.git'
          GIT_USERNAME: OmriH
          GIT_PASSWORD: ${{ secrets.GIT_PASSWORD }}
